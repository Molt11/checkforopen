name: mission-control
region: nyc
services:
  - name: mission-control-app
    instance_count: 1
    instance_size_slug: basic-xs
    dockerfile_path: mission-control/Dockerfile
    source_dir: mission-control
    http_port: 3000
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: MISSION_CONTROL_DATA_DIR
        value: /app/data
      - key: MISSION_CONTROL_DB_PATH
        value: /app/data/db/mission-control.db
      - key: MISSION_CONTROL_TOKENS_PATH
        value: /app/data/mission-control-tokens.json
      - key: AUTH_USER
        value: admin
      - key: AUTH_PASS
        value: ${AUTH_PASS}
        type: SECRET
      - key: API_KEY
        value: ${API_KEY}
        type: SECRET
      - key: MC_COORDINATOR_AGENT
        value: coordinator
      - key: NEXT_PUBLIC_COORDINATOR_AGENT
        value: coordinator
      - key: MISSION_CONTROL_REPO_ROOT
        value: /app
      - key: MC_COOKIE_SECURE
        value: "0"
      - key: MC_ALLOW_ANY_HOST
        value: "1"
      - key: MC_ALLOWED_HOSTS
        value: localhost,127.0.0.1,.digitalocean.app
      - key: OPENCLAW_BIN
        value: /app/node_modules/.bin/openclaw
      - key: ANTHROPIC_API_KEY
        value: ${ANTHROPIC_API_KEY}
        type: SECRET
      - key: XAI_API_KEY
        value: ${XAI_API_KEY}
        type: SECRET
      - key: TAVILY_API_KEY
        value: ${TAVILY_API_KEY}
        type: SECRET
      - key: GMAIL_USER
        value: ${GMAIL_USER}
        type: SECRET
      - key: GMAIL_PASS
        value: ${GMAIL_PASS}
        type: SECRET
      - key: GITHUB_TOKEN
        value: ${GITHUB_TOKEN}
        type: SECRET
      - key: AUTH_SECRET
        value: ${AUTH_SECRET}
        type: SECRET
      - key: MC_TRACKING_URL
        value: ${MC_TRACKING_URL}
        type: SECRET
      - key: MC_BASE_URL
        value: https://whale-app-jqmaz.ondigitalocean.app
      - key: NEXT_IMAGE_OPTIMIZATION_CACHE
        value: "0"
    mounts:
      - name: mission-control-data
        mount_path: /app/data
      - name: mission-control-next-cache
        mount_path: /app/.next/cache
storage:
  volumes:
    - name: mission-control-data
      size_gib: 1
    - name: mission-control-next-cache
      size_gib: 1
